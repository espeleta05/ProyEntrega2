<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrar Tarjeta NFC - Sistema de Vacunación</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .container-nfc {
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            padding: 40px;
            max-width: 500px;
            width: 90%;
        }
        h1 {
            color: #333;
            margin-bottom: 10px;
            text-align: center;
            font-size: 28px;
        }
        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 600;
            font-size: 14px;
        }
        input, select {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 5px;
            font-size: 14px;
            font-family: 'Courier New', monospace;
            transition: border-color 0.3s;
            box-sizing: border-box;
        }
        input:focus, select:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        .hint {
            font-size: 12px;
            color: #999;
            margin-top: 5px;
            font-style: italic;
        }
        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 30px;
        }
        button, .btn {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }
        .btn-secondary {
            background: #f5f5f5;
            color: #333;
            border: 2px solid #e0e0e0;
        }
        .btn-secondary:hover {
            background: #eee;
        }
        .alert {
            padding: 12px;
            border-radius: 5px;
            margin-bottom: 20px;
            font-size: 13px;
            display: none;
        }
        .alert-success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
            display: block;
        }
        .alert-danger {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
            display: block;
        }
        .loading {
            display: none;
            text-align: center;
        }
        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
            margin: 0 auto 10px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .entity-info {
            background: #f9f9f9;
            padding: 10px;
            border-radius: 5px;
            margin-top: 10px;
            font-size: 12px;
            color: #666;
            display: none;
        }
    </style>
</head>
<body>
    <div class="container-nfc">
        <h1>📱 Registrar Tarjeta NFC</h1>
        <p class="subtitle">Vincula un número de serie NFC a un trabajador o paciente</p>

        <div id="alertContainer"></div>

        <form id="nfcForm" onsubmit="handleSubmit(event)">
            <!-- UID -->
            <div class="form-group">
                <label for="uid">Número de Serie (UID)</label>
                <input 
                    type="text" 
                    id="uid" 
                    name="uid" 
                    placeholder="Ej: 3F:E9:2F:36 o 3FE92F36"
                    required
                    autocomplete="off"
                >
                <div class="hint">Copia el número de serie de la tarjeta NFC (sin guiones o con guiones)</div>
            </div>

            <!-- Tipo de Entidad -->
            <div class="form-group">
                <label for="entityType">¿A quién pertenece?</label>
                <select id="entityType" name="entityType" onchange="loadEntities()" required>
                    <option value="">-- Seleccionar --</option>
                    <option value="worker">👨‍⚕️ Trabajador/Personal</option>
                    <option value="patient">👶 Paciente</option>
                </select>
            </div>

            <!-- Entidad (trabajador o paciente) -->
            <div class="form-group">
                <label for="entityId">Selecciona la persona</label>
                <select id="entityId" name="entityId" required disabled>
                    <option value="">-- Cargando... --</option>
                </select>
                <div class="entity-info" id="entityInfo"></div>
            </div>

            <!-- Etiqueta opcional -->
            <div class="form-group">
                <label for="label">Etiqueta (opcional)</label>
                <input 
                    type="text" 
                    id="label" 
                    name="label" 
                    placeholder="Ej: Tarjeta Principal, Pulsera, etc."
                >
            </div>

            <!-- Botones -->
            <div class="button-group">
                <button type="submit" class="btn btn-primary">✓ Registrar</button>
                <a href="{{ url_for('dashboard') }}" class="btn btn-secondary" style="text-decoration: none; display: flex; align-items: center; justify-content: center;">← Atrás</a>
            </div>
        </form>

        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p>Registrando...</p>
        </div>
    </div>

    <script>
        const workers = [];
        const patients = [];

        async function loadEntities() {
            const entityType = document.getElementById('entityType').value;
            const entitySelect = document.getElementById('entityId');
            const entityInfo = document.getElementById('entityInfo');

            if (!entityType) {
                entitySelect.disabled = true;
                entityInfo.style.display = 'none';
                return;
            }

            try {
                let data = [];
                if (entityType === 'worker') {
                    const res = await fetch('/api/workers-list');
                    const json = await res.json();
                    data = json.workers || [];
                } else if (entityType === 'patient') {
                    const res = await fetch('/api/patients-list');
                    const json = await res.json();
                    data = json.patients || [];
                }

                // Llenar el select
                entitySelect.innerHTML = '<option value="">-- Seleccionar --</option>';
                data.forEach(item => {
                    const opt = document.createElement('option');
                    const id = item.worker_id !== undefined ? item.worker_id : item.patient_id;
                    opt.value = id;
                    
                    if (entityType === 'worker') {
                        const fullName = (item.full_name || `${item.first_name || ''} ${item.last_name || ''}`).trim();
                        opt.textContent = `${fullName} (ID: ${id})`;
                    } else {
                        const fullName = (item.full_name || `${item.first_name || ''} ${item.last_name || ''}`).trim();
                        opt.textContent = `${fullName} (ID: ${id})`;
                    }
                    entitySelect.appendChild(opt);
                });

                entitySelect.disabled = false;
            } catch (err) {
                showAlert('Error cargando datos', 'danger');
                console.error(err);
            }
        }

        function showAlert(message, type = 'info') {
            const container = document.getElementById('alertContainer');
            container.innerHTML = `<div class="alert alert-${type}">${message}</div>`;
            setTimeout(() => {
                container.innerHTML = '';
            }, 5000);
        }

        async function handleSubmit(event) {
            event.preventDefault();

            const uid = document.getElementById('uid').value.trim().toUpperCase();
            const entityType = document.getElementById('entityType').value;
            const entityId = document.getElementById('entityId').value;
            const entityName = document.getElementById('entityId').selectedOptions[0]?.textContent || '';
            const label = document.getElementById('label').value.trim();

            if (!uid || !entityType || !entityId) {
                showAlert('Completa todos los campos requeridos', 'danger');
                return;
            }

            const loading = document.getElementById('loading');
            const form = document.getElementById('nfcForm');
            loading.style.display = 'block';
            form.style.display = 'none';

            try {
                const res = await fetch('/api/nfc/bind', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        uid: uid,
                        entity_type: entityType,
                        entity_id: parseInt(entityId),
                        label: label || undefined,
                    }),
                });

                const json = await res.json();

                if (json.ok) {
                    showAlert(`✓ NFC registrada para ${entityType === 'worker' ? 'trabajador' : 'paciente'}: ${entityName}`, 'success');
                    setTimeout(() => {
                        window.location.href = "{{ url_for('dashboard') }}";
                    }, 2000);
                } else {
                    showAlert(json.error || 'Error al registrar', 'danger');
                    loading.style.display = 'none';
                    form.style.display = 'block';
                }
            } catch (err) {
                showAlert('Error de conexión: ' + err.message, 'danger');
                loading.style.display = 'none';
                form.style.display = 'block';
                console.error(err);
            }
        }

        // Cargar trabajadores y pacientes al iniciar
        window.addEventListener('load', () => {
            // Precargar datos si es necesario
        });
    </script>
</body>
</html>

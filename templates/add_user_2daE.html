{% extends 'base_2daE.html' %}

{% block title %}Agregar Usuario - Sistema Clínico{% endblock %}

{% block head_extra %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/pages/crud.css') }}">
{% endblock %}

{% block content %}

<div class="content-header">
    <a href="{{ url_for('personal') }}" class="back">
        <i class="fa-solid fa-arrow-left"></i> Regresar
    </a>
</div>

<div class="md3-form-card">

    <div class="md3-form-card__header">
        <h2 class="md3-form-card__title">Agregar usuario</h2>
    </div>

    {% if error %}
    <div class="md3-alert md3-alert--error" style="margin-bottom: var(--md-spacing-5);">
        <i class="fa-solid fa-circle-exclamation"></i>
        <span>{{ error }}</span>
    </div>
    {% endif %}

    <form class="md3-form" method="POST" action="{{ url_for('add_user') }}">

        <div class="md3-form__section">
            <h3 class="md3-form__section-title">Datos personales</h3>

            <div class="md3-form__row md3-form__row--2">
                <div class="md3-field">
                    <label class="md3-field__label" for="add_first_name">Nombre(s) *</label>
                    <input class="md3-input" type="text" id="add_first_name" name="first_name"
                           placeholder="Nombre(s)" value="{{ form.first_name or form.name or '' }}" required>
                </div>
                <div class="md3-field">
                    <label class="md3-field__label" for="add_last_name">Apellidos *</label>
                    <input class="md3-input" type="text" id="add_last_name" name="last_name"
                           placeholder="Apellidos paterno y materno" value="{{ form.last_name or form.lastname or '' }}" required>
                </div>
            </div>

            <div class="md3-form__row md3-form__row--2">
                <div class="md3-field">
                    <label class="md3-field__label" for="add_birth_date">Fecha de nacimiento *</label>
                    <input class="md3-input" type="date" id="add_birth_date" name="birth_date"
                           value="{{ form.birth_date or '' }}" required>
                </div>
                <div class="md3-field">
                    <label class="md3-field__label" for="add_role">Rol *</label>
                    <select class="md3-select" id="add_role" name="role_id" required>
                        <option value="" disabled {% if not form.role_id %}selected{% endif %}>Seleccionar</option>
                        {% for role in roles %}
                        <option value="{{ role.role_id }}" {% if form.role_id | string == role.role_id | string %}selected{% endif %}>{{ role.name }}</option>
                        {% endfor %}
                    </select>
                </div>
            </div>

            <div class="md3-form__row">
                <div class="md3-field">
                    <label class="md3-field__label" for="add_curp">CURP</label>
                    <input class="md3-input" type="text" id="add_curp" name="curp"
                           placeholder="Clave Única de Registro de Población" value="{{ form.curp or '' }}" maxlength="18">
                </div>
            </div>

            <div class="md3-form__row">
                <div class="md3-field">
                    <label class="md3-field__label" for="add_mail">Email / Usuario *</label>
                    <input class="md3-input" type="text" id="add_mail" name="mail"
                           placeholder="email@ejemplo.com o nombre de usuario" value="{{ form.mail or '' }}" required>
                </div>
            </div>

            <div class="md3-form__row">
                <div class="md3-field">
                    <label class="md3-field__label" for="add_address">Dirección</label>
                    <input class="md3-input" type="text" id="add_address" name="address"
                           placeholder="Calle, número, colonia" value="{{ form.address or '' }}">
                </div>
            </div>
        </div>

        <div class="md3-form__section">
            <h3 class="md3-form__section-title">Acceso al sistema</h3>

            <div class="md3-form__row md3-form__row--2">
                <div class="md3-field">
                    <label class="md3-field__label" for="add_password">Contraseña *</label>
                    <input class="md3-input" type="password" id="add_password" name="password"
                           placeholder="••••••••" required>
                </div>
                <div class="md3-field">
                    <label class="md3-field__label" for="add_password_confirm">Confirmar contraseña *</label>
                    <input class="md3-input" type="password" id="add_password_confirm" name="password_confirm"
                           placeholder="••••••••" required>
                </div>
            </div>
        </div>

        <div class="md3-form__actions">
            <a href="{{ url_for('personal') }}" class="md3-btn md3-btn--outlined">Cancelar</a>
            <button type="submit" class="md3-btn md3-btn--filled">
                <i class="fa-solid fa-user-plus"></i> Agregar usuario
            </button>
        </div>

    </form>

</div>

{% endblock %}

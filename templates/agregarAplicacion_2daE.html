{% extends 'base_2daE.html' %}

{% block title %}Registrar Aplicacion - Sistema Clinico{% endblock %}

{% block content %}

<link rel="stylesheet" href="{{ url_for('static', filename='css/form.css') }}">

<!-- HEADER -->
<div class="content-header">
    <a href="{{ url_for('aplicaciones') }}" class="back">
        <i class="fa-solid fa-arrow-left"></i> Regresar
    </a>
</div>

<div class="container">
    <div class="card">

        <h2 class="form-title">Registrar aplicacion de vacuna</h2>

        {% if error %}
        <div class="form-error">
            <i class="fa-solid fa-circle-exclamation"></i>
            {{ error }}
        </div>
        {% endif %}

        <h3 class="section-title">Datos de la aplicacion</h3>

        <form class="form" method="POST" action="{{ url_for('agregar_aplicacion') }}">

            <div class="row">
                <div class="input-group">
                    <label>Paciente</label>
                    <select name="patient_id" required>
                        <option value="" disabled {% if not form.patient_id %}selected{% endif %}>Seleccionar paciente</option>
                        {% for p in patients %}
                        <option value="{{ p.patient_id }}"
                            {% if form.patient_id | string == p.patient_id | string %}selected{% endif %}>
                            {{ p.first_name }} {{ p.last_name }} — ID: P{{ p.patient_id }}
                        </option>
                        {% endfor %}
                    </select>
                </div>

                <div class="input-group">
                    <label>Vacuna</label>
                    <select name="vaccine_id" required>
                        <option value="" disabled {% if not form.vaccine_id %}selected{% endif %}>Seleccionar vacuna</option>
                        {% for v in vaccines %}
                        <option value="{{ v.vaccine_id }}"
                            {% if form.vaccine_id | string == v.vaccine_id | string %}selected{% endif %}>
                            {{ v.name }}
                        </option>
                        {% endfor %}
                    </select>
                </div>
            </div>

            <div class="row">
                <div class="input-group">
                    <label>Aplicado por</label>
                    <select name="worker_id" required>
                        <option value="" disabled {% if not form.worker_id %}selected{% endif %}>Seleccionar personal</option>
                        {% for w in workers %}
                        <option value="{{ w.worker_id }}"
                            {% if form.worker_id | string == w.worker_id | string %}selected{% endif %}>
                            {{ w.first_name }} {{ w.last_name }}
                        </option>
                        {% endfor %}
                    </select>
                </div>

                <div class="input-group">
                    <label>Dosis del esquema</label>
                    <select name="scheme_dose_id">
                        <option value="" selected>N/A</option>
                        {% for d in scheme_doses %}
                        <option value="{{ d.dose_id }}" {% if form.scheme_dose_id | string == d.dose_id | string %}selected{% endif %}>
                            {{ d.dose_label }}
                        </option>
                        {% endfor %}
                    </select>
                </div>
            </div>

            <div class="row">
                <div class="input-group">
                    <label>Fecha de aplicacion</label>
                    <input type="date" name="applied_date"
                        value="{{ form.applied_date or '' }}" required>
                </div>

                <div class="input-group">
                    <label>Lote <span class="optional">(opcional)</span></label>
                    <select name="lot_id">
                        <option value="" selected>N/A</option>
                        {% for lot in lots %}
                        <option value="{{ lot.lot_id }}" {% if form.lot_id | string == lot.lot_id | string %}selected{% endif %}>
                            {{ lot.lot_number }}
                        </option>
                        {% endfor %}
                    </select>
                </div>
            </div>

            <div class="row">
                <div class="input-group">
                    <label>Clinica</label>
                    <select name="clinic_id" required>
                        <option value="" disabled {% if not form.clinic_id %}selected{% endif %}>Seleccionar clinica</option>
                        {% for c in clinics %}
                        <option value="{{ c.clinic_id }}" {% if form.clinic_id | string == c.clinic_id | string %}selected{% endif %}>
                            {{ c.name }}
                        </option>
                        {% endfor %}
                    </select>
                </div>

                <div class="input-group">
                    <label>Sitio de aplicacion</label>
                    <select name="application_site_id">
                        <option value="" selected>N/A</option>
                        {% for s in application_sites %}
                        <option value="{{ s.application_site_id }}" {% if form.application_site_id | string == s.application_site_id | string %}selected{% endif %}>
                            {{ s.application_site }}
                        </option>
                        {% endfor %}
                    </select>
                </div>
            </div>

            <div class="row">
                <div class="input-group">
                    <label>Temperatura paciente (C)</label>
                    <input type="number" step="0.1" name="patient_temp_c" value="{{ form.patient_temp_c or '' }}">
                </div>

                <div class="input-group">
                    <label>Tuvo reaccion</label>
                    <select name="had_reaction">
                        <option value="false" {% if form.had_reaction != 'true' %}selected{% endif %}>No</option>
                        <option value="true" {% if form.had_reaction == 'true' %}selected{% endif %}>Si</option>
                    </select>
                </div>
            </div>

            <div class="buttons">
                <a href="{{ url_for('aplicaciones') }}" class="btn cancel">Cancelar</a>
                <button type="submit" class="btn submit">
                    <i class="fa-solid fa-syringe"></i>
                    Registrar aplicacion
                </button>
            </div>

        </form>

    </div>
</div>

{% endblock %}

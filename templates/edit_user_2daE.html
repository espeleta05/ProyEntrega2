{% extends 'base_2daE.html' %}

{% block title %}Editar Usuario - Sistema Clínico{% endblock %}

{% block content %}

<link rel="stylesheet" href="{{ url_for('static', filename='css/form.css') }}">

<div class="content-header">
    <a href="{{ url_for('personal') }}" class="back">
        <i class="fa-solid fa-arrow-left"></i> Regresar
    </a>
</div>

<div class="container">
    <div class="card">

        <h2 class="form-title">Editar usuario</h2>

        <form class="form" method="POST" action="{{ url_for('edit_user', worker_id=worker.worker_id) }}">

            <div class="row">
                <div class="input-group">
                    <label>Nombre(s)</label>
                    <input type="text" name="first_name" value="{{ worker.name or '' }}" required>
                </div>

                <div class="input-group">
                    <label>Apellidos</label>
                    <input type="text" name="last_name" value="{{ worker.lastname or '' }}" required>
                </div>
            </div>

            <div class="row">
                <div class="input-group">
                    <label>Rol</label>
                    <input type="text" name="role" value="{{ worker.role or '' }}" required>
                </div>

                <div class="input-group">
                    <label>Email / Usuario</label>
                    <input type="text" name="mail" value="{{ worker.mail or '' }}">
                </div>
            </div>

            <div class="buttons">
                <a href="{{ url_for('personal') }}" class="btn cancel">Cancelar</a>
                <button type="submit" class="btn submit">
                    <i class="fa-solid fa-pen-to-square"></i>
                    Guardar cambios
                </button>
            </div>

        </form>

    </div>
</div>

{% endblock %}

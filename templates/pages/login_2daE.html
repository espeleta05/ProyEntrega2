<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — ImmuniCare</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,300..800;1,300..800&family=Open+Sans:ital,wght@0,300..800;1,300..800&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <link rel="stylesheet" href="{{ url_for('static', filename='css/design-system.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/pages/login.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/pages/tutor_login.css') }}">

</head>

<body>

<div class="login-container">
<div class="login-info">
    <h1 class="titulo-sistema">Sistema Clínico de Vacunación</h1>

    <div class="icon-group">
        <i class="fa-solid fa-user"></i>
    </div>

    <h2 class="login-title">Inicia Sesión</h2>

    <!-- Login Form -->
    <form class="login-form" method="POST">

        <label class="label">Usuario</label>

        <div class="input-box usuario-box">
            <input type="text" name="mail" placeholder="mail o user" required>
        </div>

        <label class="label">Contraseña</label>

        <div class="input-box password-box">
            <input type="password" name="password" placeholder="****" required>
        </div>

        <button type="submit" class="login-button">Iniciar sesión</button>
    </form>

    
    {% if error %}
        <p class="error">{{ error }}</p>
    {% endif %}

    <div class="demo-users d-flex flex-column flex-start">
        <p class="text-muted text-semibold">Demo users:</p>
        <p class="tutor-login-subtitle">Admin: jose.perez | admin123</p>
        <p class="tutor-login-subtitle">Recepcion: elisa.campos | recepcion123</p>
        <p class="tutor-login-subtitle">Medico: mario.luna | medico123</p>
    </div>

    <a href="#" class="forgot-password">
        ¿Olvidó su contraseña?
    </a>

    <div style="display:flex;align-items:center;gap:10px;width:100%;margin-top:4px;">
        <div style="flex:1;height:1px;background:var(--md-outline-variant,#c4c7c5);"></div>
        <span style="font-size:0.72rem;color:var(--md-on-surface-variant,#49454f);white-space:nowrap;">¿Eres padre o tutor?</span>
        <div style="flex:1;height:1px;background:var(--md-outline-variant,#c4c7c5);"></div>
    </div>

    <a href="{{ url_for('tutor_login') }}"
       style="display:inline-flex;align-items:center;gap:8px;font-size:0.83rem;font-weight:600;
              color:var(--md-primary,#6B007C);text-decoration:none;padding:8px 20px;
              border-radius:999px;border:1.5px solid var(--md-outline-variant,#c4c7c5);
              transition:background 0.2s;">
        <i class="fa-solid fa-house-medical-circle-check"></i>
        Acceder al portal familiar
    </a>

</div>
    
</div>

</body>
</html>

<aside class="sidebar">

    <h3 class="menu-title">Principal</h3>

    <nav class="menu">

        <a href="{{ url_for('dashboard') }}" class="menu-item {% if request.endpoint=='dashboard' %}active{% endif %}">
            <i class="fa-solid fa-desktop"></i>
            <span>Dashboard</span>
        </a>

        <a href="{{ url_for('pacientes') }}" class="menu-item {% if request.endpoint=='pacientes' %}active{% endif %}">
            <i class="fa-solid fa-users"></i>
            <span>Pacientes</span>
        </a>

        <a href="{{ url_for('vacunas_page') }}" class="menu-item {% if request.endpoint=='vacunas_page' or request.endpoint=='esquema_vacunacion' %}active{% endif %}">
            <i class="fa-solid fa-syringe"></i>
            <span>Vacunas</span>
        </a>

        <a href="{{ url_for('historial') }}" class="menu-item {% if request.endpoint=='historial' or request.endpoint=='esquema_paciente' %}active{% endif %}">
            <i class="fa-solid fa-file-medical"></i>
            <span>Historial médico</span>
        </a>

        <a href="{{ url_for('aplicaciones') }}" class="menu-item {% if request.endpoint=='aplicaciones' %}active{% endif %}">
            <i class="fa-solid fa-file-circle-plus"></i>
            <span>Aplicaciones</span>
        </a>

        <a href="{{ url_for('personal') }}" class="menu-item {% if request.endpoint=='personal' %}active{% endif %}">
            <i class="fa-solid fa-user-doctor"></i>
            <span>Personal</span>
        </a>

    </nav>

    <h3 class="menu-title">Módulos Avanzados</h3>

    <nav class="menu">

        <a href="{{ url_for('inventario') }}" class="menu-item {% if request.endpoint=='inventario' %}active{% endif %}">
            <i class="fa-solid fa-boxes-stacked"></i>
            <span>Inventario</span>
        </a>

        <a href="{{ url_for('citas') }}" class="menu-item {% if request.endpoint=='citas' %}active{% endif %}">
            <i class="fa-solid fa-calendar-check"></i>
            <span>Citas</span>
        </a>

        <a href="{{ url_for('nfc') }}" class="menu-item {% if request.endpoint=='nfc' %}active{% endif %}">
            <i class="fa-solid fa-credit-card"></i>
            <span>NFC</span>
        </a>

        <a href="{{ url_for('gps') }}" class="menu-item {% if request.endpoint=='gps' %}active{% endif %}">
            <i class="fa-solid fa-location-dot"></i>
            <span>GPS / Alertas</span>
        </a>

        <a href="{{ url_for('clinicas') }}" class="menu-item {% if request.endpoint=='clinicas' %}active{% endif %}">
            <i class="fa-solid fa-hospital"></i>
            <span>Clínicas</span>
        </a>

    </nav>

    <div class="user-info">
        <div class="profile-small">{{ initials }}</div>
        <div>
            <p class="user-name">{{ name }} {{ lastname }}</p>
            <p class="user-role">{{ role }}</p>
        </div>
        <a href="/logout">
            <i class="fa-solid fa-arrow-right-from-bracket"></i>
        </a>
    </div>

</aside>

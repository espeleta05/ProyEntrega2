<!-- Modal de confirmación genérico reutilizable -->
<div class="modal-overlay" id="confirmModal">
    <div class="modal-container">
        <div class="modal-header">
            <h2 id="confirmTitle">Confirmar acción</h2>
            <button class="modal-close" onclick="closeConfirmModal()">&times;</button>
        </div>
        <div class="modal-body">
            <p id="confirmMessage" class="text-muted">
                ¿Estás seguro de que deseas continuar?
            </p>
        </div>
        <div class="modal-footer">
            <button class="btn-cancel" onclick="closeConfirmModal()">Cancelar</button>
            <button class="btn-confirm" id="confirmBtn" onclick="executeConfirmAction()">Confirmar</button>
        </div>
    </div>
</div>
{# showConfirmModal, closeConfirmModal, executeConfirmAction, ESC y overlay-click son manejados por js/components/modals.js #}
